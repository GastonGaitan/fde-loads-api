services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loads
    # No publicamos 5432 al host: el API se conecta por la red interna de compose.
    # Si necesitás inspeccionar la DB desde el host, descomentá y usá un puerto libre:
    # ports:
    #   - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d loads"]
      interval: 5s
      timeout: 5s
      retries: 10

  seed:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/loads
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.seed
    restart: "no"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/loads
      API_KEY: ${API_KEY:-dev-secret-change-me}
      NEGOTIATION_MAX_MARGIN: ${NEGOTIATION_MAX_MARGIN:-0.15}
      NEGOTIATION_MAX_ROUNDS: ${NEGOTIATION_MAX_ROUNDS:-3}
      FMCSA_API_KEY: ${FMCSA_API_KEY:-}
    ports:
      # Localhost-only: reachable solely through the nginx HTTPS reverse proxy,
      # never over plain HTTP from outside.
      - "127.0.0.1:8010:8000"
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully

  dashboard:
    build: ./dashboard
    environment:
      # Reaches the API over the internal compose network. No API key here:
      # access is gated by the key the user pastes in the login screen.
      API_BASE_URL: http://api:8000
    ports:
      # Localhost-only: reachable solely through the nginx HTTPS reverse proxy.
      - "127.0.0.1:8501:8501"
    depends_on:
      - api

  # Reverse proxy with automatic HTTPS. Terminates TLS for both the API
  # (consumed by HappyRobot) and the dashboard (consumed by humans).
  #
  # Optional ("edge" profile): only starts with `docker compose --profile edge up`.
  # On a host that already runs a reverse proxy on :80/:443 (shared VPS), leave
  # this off and route the two subdomains from the existing proxy to :8010/:8501.
  # On a dedicated host with :80/:443 free, enable it for self-contained HTTPS.
  caddy:
    image: caddy:2-alpine
    profiles: ["edge"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:-api.195-35-16-20.nip.io}
      DASH_DOMAIN: ${DASH_DOMAIN:-dash.195-35-16-20.nip.io}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - dashboard

volumes:
  pgdata:
  caddy_data:
  caddy_config:
