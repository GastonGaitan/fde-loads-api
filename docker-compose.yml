services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d loads"]
      interval: 5s
      timeout: 5s
      retries: 10

  seed:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/loads
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.seed
    restart: "no"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/loads
      API_KEY: ${API_KEY:-dev-secret-change-me}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully

volumes:
  pgdata:
